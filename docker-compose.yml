services:
  postgres:
    image: postgres:16
    container_name: nyc_311_postgres
    environment:
      POSTGRES_DB: nyc_311
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nyc_311"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    container_name: nyc_311_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: nyc_311
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./data:/app/data
    command: ["python", "src/run_pipeline.py", "--csv", "data/raw/nyc_311_sample.csv"]

  airflow:
    image: apache/airflow:2.9.3-python3.11
    container_name: nyc_311_airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/nyc_311
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: nyc_311
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    command: standalone

volumes:
  postgres_data:
